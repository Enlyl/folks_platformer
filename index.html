<script>
// Internal render resolution (world is authored against this size).
// Display size is controlled separately via applyResolution() -> CSS scaling.
const GAME_W = 800;
const GAME_H = 480;
let camX = 0;
let LEVEL_W = 4500;
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
if (!ctx) {
  alert('Canvas not supported');
  throw new Error('Canvas 2D context not supported');
}
canvas.width = GAME_W;
canvas.height = GAME_H;

function applyResolution(targetW, targetH) {
  // Canvas renders a virtual world with GAME_W x GAME_H aspect (5:3). To avoid internal
  // letterbox bars we pick the largest 5:3 box that fits inside the requested target
  // resolution, then scale the result down to fit the actual browser window.
  const aspect = GAME_W / GAME_H;
  let w = Math.min(targetW, targetH * aspect);
  let h = w / aspect;
  const bottomPanel = document.getElementById('bottomPanel');
  const reservedH = (bottomPanel ? bottomPanel.offsetHeight : 0) + 72;
  const availW = Math.max(320, window.innerWidth - 48);
  const availH = Math.max(240, window.innerHeight - reservedH);
  const scale = Math.min(availW / w, availH / h, 1);
  canvas.style.width = `${Math.floor(w * scale)}px`;
  canvas.style.height = `${Math.floor(h * scale)}px`;
  syncCanvasBacking();
}

// Match the canvas internal backing store to the displayed pixel size for crisp rendering.
// Uses a UNIFORM scale so text/sprites are never stretched when the display aspect ratio
// (e.g. 16:9) differs from the internal virtual resolution aspect ratio (5:3). Any leftover
// space is left as letterbox (canvas CSS background shows through).
let canvasViewport = { scale: 1, offsetX: 0, offsetY: 0 };
function syncCanvasBacking() {
  const rect = canvas.getBoundingClientRect();
  const dpr = window.devicePixelRatio || 1;
  const backW = Math.max(1, Math.round(rect.width * dpr));
  const backH = Math.max(1, Math.round(rect.height * dpr));
  if (canvas.width !== backW || canvas.height !== backH) {
    canvas.width = backW;
    canvas.height = backH;
  }
  const s = Math.min(backW / GAME_W, backH / GAME_H);
  const ox = (backW - GAME_W * s) / 2;
  const oy = (backH - GAME_H * s) / 2;
  canvasViewport.scale = s;
  canvasViewport.offsetX = ox;
  canvasViewport.offsetY = oy;
  // Paint letterbox bars black so the seam between canvas bg and game bg is invisible.
  ctx.setTransform(1, 0, 0, 1, 0, 0);
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, backW, backH);
  ctx.setTransform(s, 0, 0, s, ox, oy);
}

function applyCurrentResolution() {
  const res = (typeof selectedResolution === 'function') ? selectedResolution() : { width: 1920, height: 1080 };
  applyResolution(res.width, res.height);
}

// Initialize - use the selected resolution; re-apply on window resize
window.addEventListener('load', () => setTimeout(applyCurrentResolution, 50));
window.addEventListener('resize', () => setTimeout(applyCurrentResolution, 50));

const mouseState = {
  x: 0,
  y: 0,
  inside: false,
};
let interactiveRegions = [];
// UI is authored in a 800x480 virtual viewport; we scale it to fit the real canvas.
const UI_W = 800;
const UI_H = 480;
let uiTransform = null;
function pushUITransform() {
  const s = Math.min(GAME_W / UI_W, GAME_H / UI_H);
  const ox = (GAME_W - UI_W * s) / 2;
  const oy = (GAME_H - UI_H * s) / 2;
  uiTransform = { s, ox, oy };
  ctx.save();
  ctx.translate(ox, oy);
  ctx.scale(s, s);
}
function popUITransform() {
  ctx.restore();
  uiTransform = null;
}
function clearInteractiveRegions() {
  interactiveRegions = [];
  canvas.style.cursor = 'default';
}
function addInteractiveRegion(x, y, w, h, onClick, onHover) {
  if (uiTransform) {
    x = x * uiTransform.s + uiTransform.ox;
    y = y * uiTransform.s + uiTransform.oy;
    w *= uiTransform.s;
    h *= uiTransform.s;
  }
  interactiveRegions.push({ x, y, w, h, onClick, onHover });
}
function canvasMousePosition(event) {
  const rect = canvas.getBoundingClientRect();
  const dpr = window.devicePixelRatio || 1;
  // Physical pixel coordinates within the backing store.
  const physX = (event.clientX - rect.left) * dpr;
  const physY = (event.clientY - rect.top) * dpr;
  // Reverse the uniform scale + letterbox offset applied by syncCanvasBacking().
  const s = canvasViewport.scale || 1;
  return {
    x: (physX - canvasViewport.offsetX) / s,
    y: (physY - canvasViewport.offsetY) / s,
  };
}
canvas.addEventListener('mousemove', event => {
  const pos = canvasMousePosition(event);
  mouseState.x = pos.x;
  mouseState.y = pos.y;
  mouseState.inside = true;
  let hovering = false;
  for (const region of interactiveRegions) {
    if (pos.x >= region.x && pos.x <= region.x + region.w && pos.y >= region.y && pos.y <= region.y + region.h) {
      hovering = true;
      canvas.style.cursor = 'pointer';
      if (region.onHover) region.onHover();
      break;
    }
  }
  if (!hovering) canvas.style.cursor = 'default';
});
canvas.addEventListener('mouseleave', () => {
  mouseState.inside = false;
  canvas.style.cursor = 'default';
});
canvas.addEventListener('mousedown', event => {
  const pos = canvasMousePosition(event);
  for (const region of interactiveRegions) {
    if (pos.x >= region.x && pos.x <= region.x + region.w && pos.y >= region.y && pos.y <= region.y + region.h) {
      if (region.onClick) region.onClick(pos);
      break;
    }
  }
});
const volumeSlider = document.getElementById('volume');
const MASTER_VOLUME_MAX = 0.022;
function currentVolume() {
  return parseFloat(volumeSlider.value) * MASTER_VOLUME_MAX;
}
volumeSlider.addEventListener('input', () => {
  if (bgGain) bgGain.gain.value = currentVolume();
});

// ---- Guitar image loader ----
const guitarImagePaths = {
  strat: 'guitars/strat.png',
  mustang: 'guitars/tele.png',
  jaguar: 'guitars/jaguar.png',
  lespaul: 'guitars/lespaul.png',
  superstart: 'guitars/superstrat.png',
  explorer: 'guitars/explorer.png',
  vshape: 'guitars/vguitar.png',
  firebird: 'guitars/firebird.png',
  iceman: 'guitars/iceman.png'
};
const guitarImages = {};
let guitarImagesReady = false;

function loadGuitarImages() {
  const names = Object.keys(guitarImagePaths);
  let loaded = 0;
  names.forEach(name => {
    const img = new Image();
    img.src = guitarImagePaths[name];
    img.onload = () => {
      loaded += 1;
      if (loaded === names.length) guitarImagesReady = true;
    };
    img.onerror = () => {
      console.warn('Could not load guitar image:', guitarImagePaths[name]);
    };
    guitarImages[name] = img;
  });
}

window.addEventListener('load', loadGuitarImages);

// ---- Audio ----
const audioCtx = new AudioContext();
function beep(freq, dur, type='square') {
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = type;
  osc.frequency.value = freq;
  const level = 0.12 * currentVolume() / MASTER_VOLUME_MAX;
  gain.gain.setValueAtTime(level, audioCtx.currentTime);
  gain.gain.linearRampToValueAtTime(level * 0.65, audioCtx.currentTime + dur * 0.45);
  gain.gain.linearRampToValueAtTime(0.0001, audioCtx.currentTime + dur);
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.start();
  osc.stop(audioCtx.currentTime + dur);
}
function jumpSound() { beep(200, 0.1); beep(300, 0.1); }
function coinSound() { beep(600, 0.1); beep(900, 0.1); }
function killSound() { beep(420, 0.08, 'triangle'); beep(480, 0.1, 'triangle'); }
function winSound() { [400,500,600,800].forEach((f,i) => setTimeout(() => beep(f, 0.15), i*100)); }
function attackSound() { beep(300, 0.1); beep(500, 0.1); }
function shopSound() { beep(400, 0.15); beep(600, 0.15); beep(800, 0.15); }
function buySound() { beep(600, 0.1); beep(900, 0.15); beep(1200, 0.2); }
function hurtSound() { beep(140, 0.15, 'square'); beep(100, 0.18, 'square'); }
function playerDeathSound() { beep(160, 0.12, 'sawtooth'); beep(90, 0.3, 'sawtooth'); beep(60, 0.4, 'square'); }
function guitarKillSound() { beep(520, 0.08, 'triangle'); beep(640, 0.1, 'triangle'); beep(720, 0.08, 'triangle'); }

// ---- Background Music ----
let bgOsc1, bgOsc2, bgOsc3, bgGain, melodyInterval;
let melodyIndex = 0;

// Per-level music themes.
const MUSIC_THEMES = {
  1: {
    // Original punk theme - driving sawtooth
    melody: [329.63, 493.88, 554.37, 493.88, 440.00, 369.99, 329.63],
    harmony: [220, 330],
    tempo: 400,
    lead: 'sawtooth',
    pad: 'sawtooth',
  },
  2: {
    // Gloomy folk - slow minor-key triangle waves, low warm harmony
    melody: [220.00, 261.63, 246.94, 220.00, 196.00, 174.61, 196.00, 220.00,
             146.83, 174.61, 196.00, 220.00, 196.00, 174.61, 164.81, 146.83],
    harmony: [110, 164.81],
    tempo: 620,
    lead: 'triangle',
    pad: 'sine',
  },
  3: {
    // Dark synth - fast bass arpeggio, detuned sawtooth pad
    melody: [65.41, 98.00, 130.81, 98.00, 65.41, 77.78, 116.54, 77.78,
             61.74, 92.50, 123.47, 92.50, 58.27, 87.31, 116.54, 87.31],
    harmony: [41.20, 65.41],
    tempo: 190,
    lead: 'sawtooth',
    pad: 'sawtooth',
  },
  4: {
    // Punk rock - driving power-chord riff, fast tempo, gritty sawtooth
    melody: [164.81, 164.81, 196.00, 164.81, 146.83, 164.81, 123.47, 146.83,
             164.81, 164.81, 196.00, 220.00, 246.94, 220.00, 196.00, 164.81],
    harmony: [82.41, 123.47],
    tempo: 180,
    lead: 'sawtooth',
    pad: 'square',
  },
};

function startBackgroundMusic() {
  if (bgGain) return; // already playing
  const theme = MUSIC_THEMES[currentLevel] || MUSIC_THEMES[1];

  bgGain = audioCtx.createGain();
  bgGain.gain.value = currentVolume();
  bgGain.connect(audioCtx.destination);

  bgOsc1 = audioCtx.createOscillator();
  bgOsc1.type = theme.lead;
  bgOsc1.frequency.value = theme.melody[0];
  bgOsc1.connect(bgGain);
  bgOsc1.start();

  bgOsc2 = audioCtx.createOscillator();
  bgOsc2.type = theme.pad;
  bgOsc2.frequency.value = theme.harmony[0];
  bgOsc2.connect(bgGain);
  bgOsc2.start();

  bgOsc3 = audioCtx.createOscillator();
  bgOsc3.type = theme.pad;
  // Detune slightly for the dark-synth theme so the harmony throbs.
  bgOsc3.frequency.value = theme.harmony[1] * (currentLevel === 3 ? 1.005 : 1);
  bgOsc3.connect(bgGain);
  bgOsc3.start();

  melodyIndex = 0;
  const melody = theme.melody;
  melodyInterval = setInterval(() => {
    bgOsc1.frequency.value = melody[melodyIndex];
    melodyIndex = (melodyIndex + 1) % melody.length;
  }, theme.tempo);
}
function stopBackgroundMusic() {
  if (bgGain) {
    clearInterval(melodyInterval);
    bgOsc1.stop();
    bgOsc2.stop();
    bgOsc3.stop();
    bgGain = null;
  }
}

// ---- Input ----
const keys = {};
window.addEventListener('keydown', e => { keys[e.code] = true; e.preventDefault(); });
window.addEventListener('keyup', e => { keys[e.code] = false; });

// Gamepad state tracking
const gamepadState = {
  leftStickX: 0, leftStickY: 0,
  rightStickX: 0, rightStickY: 0,
  buttons: {},
  triggers: { left: 0, right: 0 }
};

// Deadzone for analog sticks
const GAMEPAD_DEADZONE = 0.25;

function pollGamepad() {
  const gamepads = navigator.getGamepads?.() || navigator.webkitGetGamepads?.();
  if (!gamepads || gamepads.length === 0) return;

  const gp = gamepads[0]; // Use first connected gamepad
  if (!gp) return;

  // Reset gamepad-based keys
  keys['gpLeft'] = false;
  keys['gpRight'] = false;
  keys['gpUp'] = false;
  keys['gpDown'] = false;
  keys['gpJump'] = false;
  keys['gpAttack'] = false;
  keys['gpStart'] = false;
  keys['gpB'] = false;

  // Left Stick (for movement/navigation)
  gamepadState.leftStickX = gp.axes[0] || 0;
  gamepadState.leftStickY = gp.axes[1] || 0;

  if (Math.abs(gamepadState.leftStickX) > GAMEPAD_DEADZONE) {
    if (gamepadState.leftStickX < -GAMEPAD_DEADZONE) keys['gpLeft'] = true;
    if (gamepadState.leftStickX > GAMEPAD_DEADZONE) keys['gpRight'] = true;
  }
  if (Math.abs(gamepadState.leftStickY) > GAMEPAD_DEADZONE) {
    if (gamepadState.leftStickY < -GAMEPAD_DEADZONE) keys['gpUp'] = true;
    if (gamepadState.leftStickY > GAMEPAD_DEADZONE) keys['gpDown'] = true;
  }

  // D-Pad (buttons 12-15)
  if (gp.buttons[12]?.pressed) keys['gpUp'] = true;
  if (gp.buttons[13]?.pressed) keys['gpDown'] = true;
  if (gp.buttons[14]?.pressed) keys['gpLeft'] = true;
  if (gp.buttons[15]?.pressed) keys['gpRight'] = true;

  // A button (button 0) = Jump/Select
  if (gp.buttons[0]?.pressed) keys['gpJump'] = true;
  
  // X button (button 2) = Attack
  if (gp.buttons[2]?.pressed) keys['gpAttack'] = true;
  
  // Start/Menu (button 9) = Enter/Confirm
  if (gp.buttons[9]?.pressed) keys['gpStart'] = true;

  // B button (button 1) for alternative actions if needed
  if (gp.buttons[1]?.pressed) keys['gpB'] = true;

  // LT/RT triggers
  gamepadState.triggers.left = gp.buttons[4]?.pressed || (gp.axes[4] > 0.5);
  gamepadState.triggers.right = gp.buttons[5]?.pressed || (gp.axes[5] > 0.5);
}

// Fixed roster of 5 presets (stable across reloads)
const presetPlayers = [

// ---- Guitars ----
// Shape types: strat, mustang, jaguar, lespaul, superstart, explorer, vshape
// Each guitar has a UNIQUE damage value and a progressively harder price - the final
// guitar (V-Guitar) is intended to be affordable only after ~3-4 winning runs.
const guitarTypes = [

function generateReceiptItems(beerCollected) {
  const items = [];
  const numItems = 3 + Math.floor(beerCollected / 10);
  const usedIndices = new Set();
  
  for (let i = 0; i < Math.min(numItems, punkShopItems.length); i++) {
    let idx;
    do {
      idx = Math.floor(Math.random() * punkShopItems.length);
    } while (usedIndices.has(idx));
    usedIndices.add(idx);
    
    const item = punkShopItems[idx];
    const quantity = 1 + Math.floor(Math.random() * 3);
    const price = item.basePrice + Math.floor(Math.random() * 5);
    items.push({
      name: item.name,
      quantity: quantity,
      unitPrice: price,
      total: quantity * price
    });
  }
  return items;
}

function updateStartScreen() {
  const movePrev = (keys['ArrowLeft'] && !keys['ArrowLeft_held']) || (keys['KeyA'] && !keys['KeyA_held']) || (keys['gpLeft'] && !keys['gpLeft_held']);
  const moveNext = (keys['ArrowRight'] && !keys['ArrowRight_held']) || (keys['KeyD'] && !keys['KeyD_held']) || (keys['gpRight'] && !keys['gpRight_held']);
  const moveUp = (keys['ArrowUp'] && !keys['ArrowUp_held']) || (keys['KeyW'] && !keys['KeyW_held']) || (keys['gpUp'] && !keys['gpUp_held']);
  const moveDown = (keys['ArrowDown'] && !keys['ArrowDown_held']) || (keys['KeyS'] && !keys['KeyS_held']) || (keys['gpDown'] && !keys['gpDown_held']);
  const confirm = (keys['Enter'] && !keys['Enter_held']) || (keys['KeyE'] && !keys['KeyE_held']) || (keys['gpJump'] && !keys['gpJump_held']);
  const play = (keys['Space'] && !keys['Space_held']) || (keys['gpStart'] && !keys['gpStart_held']);

  if (moveUp) creatorSelection = Math.max(0, creatorSelection - 1);
  if (moveDown) creatorSelection = Math.min(CREATOR_ITEMS.length - 1, creatorSelection + 1);

  if (movePrev || moveNext || confirm) {
    const dir = movePrev ? -1 : 1;
    switch (creatorSelection) {
      case 0:
        applyPreset((characterProfile.presetIndex + presetPlayers.length + dir) % presetPlayers.length);
        break;
      case 1:
        characterProfile.hairIndex = (characterProfile.hairIndex + creatorOptions.hairColors.length + dir) % creatorOptions.hairColors.length;
        break;
      case 2:
        characterProfile.shirtIndex = (characterProfile.shirtIndex + creatorOptions.shirtColors.length + dir) % creatorOptions.shirtColors.length;
        break;
      case 3:
        characterProfile.patternIndex = (characterProfile.patternIndex + creatorOptions.shirtPatterns.length + dir) % creatorOptions.shirtPatterns.length;
        break;
      case 4:
        characterProfile.skinIndex = (characterProfile.skinIndex + creatorOptions.skinTones.length + dir) % creatorOptions.skinTones.length;
        break;
      case 5:
        characterProfile.pantsIndex = (characterProfile.pantsIndex + creatorOptions.pantsColors.length + dir) % creatorOptions.pantsColors.length;
        break;
      case 6:
        if (movePrev || moveNext) creatorSelection = 7;
        else if (confirm) { gameState = 'settings'; settingsReturnTo = 'start'; settingsSelection = 0; }
        break;
      case 7:
        if (movePrev) creatorSelection = 6;
        else if (confirm || play) startGame();
        break;
    }
  }

  // SPACE / START should always launch the game, regardless of current selection
  if (play) startGame();

  keys['ArrowLeft_held'] = keys['ArrowLeft'];
  keys['ArrowRight_held'] = keys['ArrowRight'];
  keys['ArrowUp_held'] = keys['ArrowUp'];
  keys['ArrowDown_held'] = keys['ArrowDown'];
  keys['KeyA_held'] = keys['KeyA'];
  keys['KeyD_held'] = keys['KeyD'];
  keys['KeyW_held'] = keys['KeyW'];
  keys['KeyS_held'] = keys['KeyS'];
  keys['Enter_held'] = keys['Enter'];
  keys['KeyE_held'] = keys['KeyE'];
  keys['Space_held'] = keys['Space'];
  keys['gpLeft_held'] = keys['gpLeft'];
  keys['gpRight_held'] = keys['gpRight'];
  keys['gpUp_held'] = keys['gpUp'];
  keys['gpDown_held'] = keys['gpDown'];
  keys['gpJump_held'] = keys['gpJump'];
  keys['gpStart_held'] = keys['gpStart'];
}

function updateSettingsScreen() {
  const movePrev = (keys['ArrowLeft'] && !keys['ArrowLeft_held']) || (keys['KeyA'] && !keys['KeyA_held']) || (keys['gpLeft'] && !keys['gpLeft_held']);
  const moveNext = (keys['ArrowRight'] && !keys['ArrowRight_held']) || (keys['KeyD'] && !keys['KeyD_held']) || (keys['gpRight'] && !keys['gpRight_held']);
  const moveUp = (keys['ArrowUp'] && !keys['ArrowUp_held']) || (keys['KeyW'] && !keys['KeyW_held']) || (keys['gpUp'] && !keys['gpUp_held']);
  const moveDown = (keys['ArrowDown'] && !keys['ArrowDown_held']) || (keys['KeyS'] && !keys['KeyS_held']) || (keys['gpDown'] && !keys['gpDown_held']);
  const confirm = (keys['Enter'] && !keys['Enter_held']) || (keys['KeyE'] && !keys['KeyE_held']) || (keys['gpJump'] && !keys['gpJump_held']);
  const back = (keys['Escape'] && !keys['Escape_held']) || (keys['Space'] && !keys['Space_held']) || (keys['gpStart'] && !keys['gpStart_held']) || keys['gpB'];

  if (moveUp) settingsSelection = Math.max(0, settingsSelection - 1);
  if (moveDown) settingsSelection = Math.min(SETTINGS_ITEMS.length - 1, settingsSelection + 1);

  if (settingsSelection === 0 && (movePrev || moveNext)) {
    const dir = movePrev ? -1 : 1;
    characterProfile.pendingResolutionIndex = (characterProfile.pendingResolutionIndex + creatorOptions.resolutions.length + dir) % creatorOptions.resolutions.length;
  }

  if (settingsSelection === 1 && confirm) {
    applyDisplayResolution();
  }

  if ((settingsSelection === 2 && confirm) || back) {
    characterProfile.pendingResolutionIndex = characterProfile.resolutionIndex;
    gameState = settingsReturnTo === 'paused' ? 'paused' : 'start';
  }

  keys['ArrowLeft_held'] = keys['ArrowLeft'];
  keys['ArrowRight_held'] = keys['ArrowRight'];
  keys['ArrowUp_held'] = keys['ArrowUp'];
  keys['ArrowDown_held'] = keys['ArrowDown'];
  keys['KeyA_held'] = keys['KeyA'];
  keys['KeyD_held'] = keys['KeyD'];
  keys['KeyW_held'] = keys['KeyW'];
  keys['KeyS_held'] = keys['KeyS'];
  keys['Enter_held'] = keys['Enter'];
  keys['KeyE_held'] = keys['KeyE'];
  keys['Space_held'] = keys['Space'];
  keys['Escape_held'] = keys['Escape'];
  keys['gpLeft_held'] = keys['gpLeft'];
  keys['gpRight_held'] = keys['gpRight'];
  keys['gpUp_held'] = keys['gpUp'];
  keys['gpDown_held'] = keys['gpDown'];
  keys['gpJump_held'] = keys['gpJump'];
  keys['gpStart_held'] = keys['gpStart'];
}

function updatePauseScreen() {
  const moveUp = (keys['ArrowUp'] && !keys['ArrowUp_held']) || (keys['KeyW'] && !keys['KeyW_held']) || (keys['gpUp'] && !keys['gpUp_held']);
  const moveDown = (keys['ArrowDown'] && !keys['ArrowDown_held']) || (keys['KeyS'] && !keys['KeyS_held']) || (keys['gpDown'] && !keys['gpDown_held']);
  const confirm = (keys['Enter'] && !keys['Enter_held']) || (keys['KeyE'] && !keys['KeyE_held']) || (keys['Space'] && !keys['Space_held']) || (keys['gpJump'] && !keys['gpJump_held']);
  // Esc / Start / gpB close the pause menu (resume).
  const resumeShortcut = (keys['Escape'] && !keys['Escape_held']) || (keys['gpStart'] && !keys['gpStart_held']) || (keys['gpB'] && !keys['gpB_held']);

  if (moveUp) pauseSelection = (pauseSelection - 1 + PAUSE_ITEMS.length) % PAUSE_ITEMS.length;
  if (moveDown) pauseSelection = (pauseSelection + 1) % PAUSE_ITEMS.length;

  if (resumeShortcut) {
    gameState = 'playing';
  } else if (confirm) {
    if (pauseSelection === 0) {
      gameState = 'playing';
    } else if (pauseSelection === 1) {
      gameState = 'settings';
      settingsReturnTo = 'paused';
      settingsSelection = 0;
      characterProfile.pendingResolutionIndex = characterProfile.resolutionIndex;
    } else if (pauseSelection === 2) {
      // Exit to main menu: abandon the current run.
      if (bgGain) stopBackgroundMusic();
      lives = 3;
      score = 0;
      levelDeathCount = 0;
      lastCompletedLevel = 0;
      currentLevel = 1;
      gameState = 'start';
      creatorSelection = 7;
    }
  }

  keys['ArrowUp_held'] = keys['ArrowUp'];
  keys['ArrowDown_held'] = keys['ArrowDown'];
  keys['KeyW_held'] = keys['KeyW'];
  keys['KeyS_held'] = keys['KeyS'];
  keys['Enter_held'] = keys['Enter'];
  keys['KeyE_held'] = keys['KeyE'];
  keys['Space_held'] = keys['Space'];
  keys['Escape_held'] = keys['Escape'];
  keys['gpUp_held'] = keys['gpUp'];
  keys['gpDown_held'] = keys['gpDown'];
  keys['gpJump_held'] = keys['gpJump'];
  keys['gpStart_held'] = keys['gpStart'];
  keys['gpB_held'] = keys['gpB'];
}

function resetPlayer() {
  player.x = 80;
  player.y = 404;
  player.vx = 0;
  player.vy = 0;
  player.onGround = false;
  player.invincible = false;
  player.invincibleTimer = 0;
  player.attacking = false;
  player.attackTimer = 0;
  player.attackCooldown = 0;
}

// ---- Camera ----
function updateCamera() {
  const target = player.x - 300;
  camX += (target - camX) * 0.1;
  camX = Math.max(0, Math.min(camX, LEVEL_W - GAME_W));
}

// ---- Physics ----
const GRAVITY = 0.5;
const JUMP_FORCE = -12;
const SPEED = 2.5;
const MAX_FALL = 10;

function rects(a, b) {
  return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y;
}

// ---- Update ----
function update() {
  if (gameState === 'start') {
    updateStartScreen();
    return;
  }
  if (gameState === 'settings') {
    updateSettingsScreen();
    return;
  }
  if (gameState === 'paused') {
    updatePauseScreen();
    return;
  }
  if (gameState !== 'playing') return;

  // Pause trigger: Escape key or gamepad Start button opens the pause menu.
  if ((keys['Escape'] && !keys['Escape_held']) || (keys['gpStart'] && !keys['gpStart_held'])) {
    gameState = 'paused';
    pauseSelection = 0;
    keys['Escape_held'] = true;
    keys['gpStart_held'] = true;
    if (bgGain) stopBackgroundMusic();
    return;
  }
  if (!keys['Escape']) keys['Escape_held'] = false;
  if (!keys['gpStart']) keys['gpStart_held'] = false;

  // Invincibility timer
  if (player.invincible) {
    player.invincibleTimer--;
    if (player.invincibleTimer <= 0) player.invincible = false;
  }

  // Attack cooldown
  if (player.attackCooldown > 0) player.attackCooldown--;

  // Attack input (keyboard or gamepad)
  if ((keys['KeyE'] || keys['KeyJ'] || keys['gpAttack']) && !player.attacking && player.attackCooldown === 0 && player.hasGuitar) {
    player.attacking = true;
    player.attackTimer = 15;
    player.attackCooldown = 30;
    attackSound();
  }

  // Attack animation
  if (player.attacking) {
    player.attackTimer--;
    if (player.attackTimer <= 0) player.attacking = false;
  }

  // Input (keyboard or gamepad)
  if (keys['ArrowLeft'] || keys['KeyA'] || keys['gpLeft']) { player.vx = -SPEED; player.facing = -1; }
  else if (keys['ArrowRight'] || keys['KeyD'] || keys['gpRight']) { player.vx = SPEED; player.facing = 1; }
  else player.vx *= 0.8;

  if ((keys['Space'] || keys['ArrowUp'] || keys['KeyW'] || keys['gpJump'] || keys['gpUp']) && player.onGround) {
    player.vy = JUMP_FORCE;
    player.onGround = false;
    jumpSound();
  }

  // Physics
  player.vy += GRAVITY;
  if (player.vy > MAX_FALL) player.vy = MAX_FALL;

  player.x += player.vx;
  if (player.x < 0) player.x = 0;
  if (player.x > LEVEL_W - player.w) player.x = LEVEL_W - player.w;

  player.y += player.vy;
  player.onGround = false;

  // Platform collisions
  for (const p of platforms) {
    if (rects(player, p)) {
      const prevBottom = player.y + player.h - player.vy;
      if (prevBottom <= p.y && player.vy >= 0) {
        player.y = p.y - player.h;
        player.vy = 0;
        player.onGround = true;
      } else if (player.vy < 0 && player.y >= p.y + p.h - 10) {
        player.y = p.y + p.h;
        player.vy = 0;
      }
    }
  }

  // Fall death
  if (player.y > 520) {
    lives--;
    if (lives <= 0) {
      gameState = 'gameover';
      levelDeathCount++;
      playerDeathSound();
    }
    else resetPlayer();
  }

  // Beer collection
  for (const c of beerCans) {
    if (!c.collected && rects(player, { x: c.x - 12, y: c.y - 12, w: 24, h: 24 })) {
      c.collected = true;
      if (c.golden) {
        if (lives < 3) {
          // Missing hearts -> restore one. No score bonus.
          lives++;
        } else {
          // Full health -> reward with 50 beer points.
          score += 50;
        }
        winSound();
      } else {
        score += 10;
        coinSound();
      }
    }
  }

  // Enemy update & collision
  for (const e of enemies) {
    if (!e.alive) continue;

    // Dashers: spawn just off the visible screen edge and sprint to the opposite
    // off-screen edge. They never appear or vanish within the visible area.
    if (e.type === 'dasher') {
      if (!e.active) {
        e.respawn--;
        if (e.respawn <= 0) {
          const dir = Math.random() < 0.5 ? 1 : -1;
          e.vx = dir * e.speed;
          // Spawn just beyond the current visible screen edge.
          e.x = dir > 0 ? (camX - 80) : (camX + GAME_W + 80);
          e.active = true;
        }
      } else {
        e.x += e.vx;
        // Deactivate only once fully past the OPPOSITE visible-screen edge.
        const screenX = e.x - camX;
        if ((e.vx > 0 && screenX > GAME_W + 80) || (e.vx < 0 && screenX < -80)) {
          e.active = false;
          e.respawn = 180 + Math.floor(Math.random() * 180);
        }
      }
    } else {
      e.x += e.vx;
      if (e.x <= e.min || e.x >= e.max) e.vx *= -1;
      if (e.type === 'flyer') {
        e.y += e.vy;
        if (e.y <= e.minY || e.y >= e.maxY) e.vy *= -1;
      }
    }

    // Decay per-enemy timers.
    if (e.hitCooldown > 0) e.hitCooldown--;
    if (e.hitFlash > 0) e.hitFlash--;

    const isBrute = e.type === 'brute';
    const isDasher = e.type === 'dasher';
    const isRat = e.type === 'rat';

    // Dashers that are off-screen do not collide or get drawn.
    if (isDasher && !e.active) continue;

    // Enemy hitboxes.
    let hbW = 28, hbH = 28;
    if (isBrute) { hbW = 40; hbH = 40; }
    else if (isRat) { hbW = 26; hbH = 18; }
    else if (isDasher) { hbW = 56; hbH = 32; }
    const enemyRect = { x: e.x - hbW / 2, y: e.y - hbH, w: hbW, h: hbH };

    // Guitar attack - AABB overlap between a tight swing hitbox and the enemy hitbox.
    // Dashers are armored: guitar attacks pass right through them.
    if (player.attacking && player.attackTimer > 2 && e.hitCooldown === 0 && !e.invulnerable) {
      const attackProgress = (15 - player.attackTimer) / 15;
      const gx = player.x + (player.facing > 0 ? 58 : -32);
      const gy = player.y - 18 + attackProgress * 38;
      const guitarRect = { x: gx - 18, y: gy - 8, w: 36, h: 54 };
      if (rects(guitarRect, enemyRect)) {
        const dmg = guitarTypes[player.guitarType].damage;
        e.hp -= dmg;
        e.hitCooldown = 18;
        e.hitFlash = 10;
        if (e.hp <= 0) {
          e.alive = false;
          score += isBrute ? 120 : 50;
          guitarKillSound();
        } else {
          hurtSound();
        }
        continue;
      }
    }

    if (rects(player, enemyRect)) {
      const prevBottom = player.y + player.h - player.vy;
      // Brutes are spiky, dashers are armored carts -> cannot be stomped.
      const canStomp = !isBrute && !isDasher;
      if (canStomp && prevBottom < e.y && player.vy > 0) {
        e.alive = false;
        player.vy = -8;
        score += 50;
        killSound();
      } else if (!player.invincible) {
        lives--;
        if (lives <= 0) {
          gameState = 'gameover';
          levelDeathCount++;
          playerDeathSound();
        }
        else {
          player.invincible = true;
          player.invincibleTimer = 120;
          // Bounce player away from brute so they're not stuck in damage loop.
          if (isBrute) {
            player.vy = -6;
            player.vx = player.x < e.x ? -4 : 4;
          }
        }
        hurtSound();
      }
    }
  }

  // Poison drippers (level 4): ceiling sources periodically release acid drops
  // that fall until they hit the ground or the player. Only update drippers whose
  // source is reasonably near the screen to keep things cheap.
  for (const src of poisonSources) {
    const dx = src.x - camX;
    if (dx < -80 || dx > GAME_W + 80) continue;
    src.timer--;
    if (src.timer <= 0) {
      poisonDrops.push({ x: src.x, y: src.y + 10, vy: 0 });
      src.timer = src.interval + Math.floor(Math.random() * 40);
    }
  }
  for (let i = poisonDrops.length - 1; i >= 0; i--) {
    const d = poisonDrops[i];
    d.vy += 0.42;
    if (d.vy > 11) d.vy = 11;
    d.y += d.vy;

    // Splat on ground.
    if (d.y > 442) {
      poisonDrops.splice(i, 1);
      continue;
    }
    // Hit the player.
    const dropRect = { x: d.x - 3, y: d.y - 5, w: 6, h: 10 };
    if (!player.invincible && rects(player, dropRect)) {
      lives--;
      if (lives <= 0) {
        gameState = 'gameover';
        levelDeathCount++;
        playerDeathSound();
      } else {
        player.invincible = true;
        player.invincibleTimer = 120;
      }
      hurtSound();
      poisonDrops.splice(i, 1);
    }
  }

  // Win - advance to next level after the shop.
  if (player.x + player.w > player.goalX) {
    totalBeer += score;
    winSound();
    lastCompletedLevel = currentLevel;
    currentLevel = (currentLevel % TOTAL_LEVELS) + 1;
    levelDeathCount = 0; // Fresh attempts on the new level.
    gameState = 'shop';
    shopCol = 0;
    shopRow = 0;
    shopFocus = 'grid';
    shopFooterSel = 1;
  }

  // Animation
  if (Math.abs(player.vx) > 0.5) {
    player.animTimer++;
    if (player.animTimer > 8) { player.animTimer = 0; player.animFrame = (player.animFrame + 1) % 4; }
  } else {
    player.animFrame = 0;
    player.animTimer++;
  }

  updateCamera();
}

// Handle scene transitions (keyboard + gamepad)
function handleGameStateTransitions() {
  if (!keys['Space_transition_held'] && !keys['Enter_transition_held']) {
    if (keys['Space']) keys['Space_transition_held'] = true;
    if (keys['Enter'] || keys['gpStart'] || keys['gpJump']) keys['Enter_transition_held'] = true;
  }

  if (keys['Space_transition_held'] || keys['Enter_transition_held']) {
    if (gameState === 'gameover') {
      audioCtx.resume();
      // On non-first levels the player gets up to MAX_DEATHS_PER_LEVEL tries before
      // being kicked back to level 1. Level 1 always restarts from scratch.
      if (currentLevel > 1 && levelDeathCount < MAX_DEATHS_PER_LEVEL) {
        // Respawn on the same level; keep the death counter.
        startGame();
      } else {
        currentLevel = 1;
        levelDeathCount = 0;
        startGame();
      }
    }
    keys['Space_transition_held'] = false;
    keys['Enter_transition_held'] = false;
  }

  if (!keys['Space'] && !keys['Enter'] && !keys['gpStart'] && !keys['gpJump']) {
    keys['Space_transition_held'] = false;
    keys['Enter_transition_held'] = false;
  }
}

// ---- Draw ----
// Draw a pixel-art guitar shape - faces right by default
function drawGuitarShape(x, y, facing, guitarIdx, isAttacking, attackTimerVal) {
  const g = guitarTypes[guitarIdx];
  ctx.save();
  ctx.translate(x, y);
  if (facing < 0) ctx.scale(-1, 1);

  // Glow for expensive guitars
  if (guitarIdx >= 4) {
    ctx.shadowColor = g.color;
    ctx.shadowBlur = 10;
  }

  // Attack swing rotation
  if (isAttacking) {
    const rotation = -118 + (15 - attackTimerVal) / 15 * 132;
    ctx.translate(40, 12);
    ctx.rotate(rotation * Math.PI / 180);
    ctx.translate(-40, -12);
  }

  const c = g.color;
  const dark = '#1a1a1a';
  const metal = '#c0c0c0';
  const str = '#efefef';
  const pickb = '#1a1a1a';
  const wood = '#3a2a1a';
  const fretboard = '#2a2020';

  if (guitarImagesReady && guitarImages[g.shape] && guitarImages[g.shape].complete) {
    const img = guitarImages[g.shape];
    ctx.drawImage(img, -26, -16, 52, 38);
    ctx.restore();
    return;
  }

  switch (g.shape) {
    case 'strat':
      // Stratocaster: classic Fender with sunburst finish
      // Main body - sunburst gradient effect (dark edges, lighter center)
      // Outer darker edge
      ctx.fillStyle = '#4a1a0a';
      ctx.beginPath();
      ctx.moveTo(8, 13);
      ctx.bezierCurveTo(6, 16, 6, 18, 7, 22);
      ctx.bezierCurveTo(8, 26, 14, 28, 18, 28);
      ctx.bezierCurveTo(22, 28, 24, 27, 25, 26);
      ctx.lineTo(27, 20);
      ctx.bezierCurveTo(28, 16, 26, 12, 22, 10);
      ctx.bezierCurveTo(18, 8, 12, 8, 8, 13);
      ctx.closePath();
      ctx.fill();
      
      // Mid-tone body
      ctx.fillStyle = '#8b4513';
      ctx.beginPath();
      ctx.moveTo(10, 14);
      ctx.bezierCurveTo(8, 17, 8, 19, 9, 23);
      ctx.bezierCurveTo(10, 26, 15, 27, 18, 27);
      ctx.bezierCurveTo(21, 27, 23, 26, 24, 25);
      ctx.lineTo(26, 19);
      ctx.bezierCurveTo(27, 15, 25, 11, 21, 9);
      ctx.bezierCurveTo(17, 8, 12, 8, 10, 14);
      ctx.closePath();
      ctx.fill();
      
      // Lighter center sunburst
      ctx.fillStyle = '#d4a574';
      ctx.beginPath();
      ctx.moveTo(12, 15);
      ctx.bezierCurveTo(10, 18, 10, 20, 11, 24);
      ctx.bezierCurveTo(12, 25, 16, 26, 18, 26);
      ctx.bezierCurveTo(20, 26, 22, 25, 23, 24);
      ctx.lineTo(25, 18);
      ctx.bezierCurveTo(26, 14, 24, 10, 20, 9);
      ctx.bezierCurveTo(16, 8, 13, 9, 12, 15);
      ctx.closePath();
      ctx.fill();
      
      // White pickguard
      ctx.fillStyle = '#f5f5f0';
      ctx.beginPath();
      ctx.moveTo(12, 17);
      ctx.lineTo(24, 15);
      ctx.lineTo(24, 24);
      ctx.lineTo(14, 25);
      ctx.lineTo(12, 22);
      ctx.closePath();
      ctx.fill();
      
      // Pickguard edge shadow
      ctx.strokeStyle = 'rgba(0,0,0,0.3)';
      ctx.lineWidth = 0.5;
      ctx.stroke();
      
      // Neck (maple/lighter wood)
      ctx.fillStyle = '#d2b48c';
      ctx.fillRect(28, 12, 19, 4);
      
      // Fretboard (darker)
      ctx.fillStyle = '#2a2020';
      ctx.fillRect(28, 12, 19, 2);
      
      // Frets (metal)
      ctx.strokeStyle = '#c0c0c0';
      ctx.lineWidth = 0.5;
      for (let i = 0; i < 6; i++) {
        ctx.beginPath();
        ctx.moveTo(28 + i * 3.2, 12);
        ctx.lineTo(28 + i * 3.2, 14);
        ctx.stroke();
      }
      
      // Headstock (classic Fender shape)
      ctx.fillStyle = '#d2b48c';
      ctx.beginPath();
      ctx.moveTo(48, 9);
      ctx.lineTo(57, 7);
      ctx.lineTo(59, 8);
      ctx.lineTo(59, 14);
      ctx.lineTo(57, 15);
      ctx.lineTo(48, 16);
      ctx.closePath();
      ctx.fill();
      
      // Headstock logo area
      ctx.fillStyle = 'rgba(255,255,255,0.2)';
      ctx.fillRect(50, 10, 6, 2);
      
      // Tuning pegs (6 in 3x2 configuration)
      ctx.fillStyle = '#a0a0a0';
      for (let i = 0; i < 3; i++) {
        ctx.beginPath();
        ctx.arc(51, 10 + i * 2.5, 1.2, 0, Math.PI * 2);
        ctx.fill();
        ctx.beginPath();
        ctx.arc(58, 10 + i * 2.5, 1.2, 0, Math.PI * 2);
        ctx.fill();
      }
      
      // Body pickups (3 single coils - white)
      ctx.fillStyle = '#f5f5f0';
      ctx.fillRect(21, 13, 3.5, 2.5);
      ctx.fillRect(21, 18, 3.5, 2.5);
      ctx.fillRect(21, 23, 3.5, 2.5);
      
      // Pickup poles (black/dark)
      ctx.fillStyle = '#1a1a1a';
      for (let j = 0; j < 3; j++) {
        for (let i = 0; i < 6; i++) {
          ctx.fillRect(21.8 + i * 0.5, 13.5 + j * 5, 0.3, 1.5);
        }
      }
      
      // Tremolo bridge (vibrato system)
      ctx.fillStyle = '#c0c0c0';
      ctx.fillRect(15, 26, 12, 1.5);
      ctx.fillStyle = '#888888';
      ctx.fillRect(16, 26.5, 10, 0.5);
      
      // Bridge saddles
      ctx.fillStyle = '#a0a0a0';
      for (let i = 0; i < 6; i++) {
        ctx.fillRect(16.5 + i * 1.5, 25.5, 0.8, 1.5);
      }
      
      // Control knobs (volume, tone)
      ctx.fillStyle = '#333333';
      ctx.beginPath();
      ctx.arc(9, 19, 1.5, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.arc(9, 24, 1.5, 0, Math.PI * 2);
      ctx.fill();
      
      // Strings
      ctx.strokeStyle = '#e8e8e8';
      ctx.lineWidth = 0.7;
      for (let i = 0; i < 3; i++) {
        ctx.beginPath();
        ctx.moveTo(28, 12.8 + i * 0.9);
        ctx.lineTo(58, 12.8 + i * 0.9);
        ctx.stroke();
      }
      
      // Body outline (subtle)
      ctx.strokeStyle = 'rgba(0,0,0,0.4)';
      ctx.lineWidth = 0.5;
      ctx.beginPath();
      ctx.moveTo(8, 13);
      ctx.bezierCurveTo(6, 16, 6, 18, 7, 22);
      ctx.bezierCurveTo(8, 26, 14, 28, 18, 28);
      ctx.bezierCurveTo(22, 28, 24, 27, 25, 26);
      ctx.lineTo(27, 20);
      ctx.bezierCurveTo(28, 16, 26, 12, 22, 10);
      ctx.bezierCurveTo(18, 8, 12, 8, 8, 13);
      ctx.closePath();
      ctx.stroke();
      break;

    case 'mustang':
      // Telecaster: squared single-cutaway, clean design
      ctx.fillStyle = c;
      ctx.beginPath();
      ctx.moveTo(10, 13);
      ctx.lineTo(23, 11);
      ctx.lineTo(26, 17);
      ctx.lineTo(26, 25);
      ctx.lineTo(20, 27);
      ctx.lineTo(10, 27);
      ctx.lineTo(6, 19);
      ctx.closePath();
      ctx.fill();
      ctx.strokeStyle = dark;
      ctx.lineWidth = 1;
      ctx.stroke();
      // Neck
      ctx.fillStyle = wood;
      ctx.fillRect(28, 12, 19, 4);
      // Fretboard
      ctx.fillStyle = fretboard;
      ctx.fillRect(28, 13, 19, 2);
      // Headstock (Fender single-col)
      ctx.fillStyle = wood;
      ctx.fillRect(48, 9, 10, 8);
      // Tuning pegs (3x2)
      ctx.fillStyle = metal;
      for (let i = 0; i < 3; i++) {
        ctx.beginPath();
        ctx.arc(50, 11 + i * 2, 0.8, 0, Math.PI * 2);
        ctx.fill();
        ctx.beginPath();
        ctx.arc(56, 11 + i * 2, 0.8, 0, Math.PI * 2);
        ctx.fill();
      }
      // Body pickups (2 single coils)
      ctx.fillStyle = pickb;
      ctx.fillRect(22, 14, 4, 2);
      ctx.fillRect(22, 22, 4, 2);
      // Bridge plate
      ctx.fillStyle = metal;
      ctx.fillRect(14, 27, 12, 1);
      // Strings
      ctx.strokeStyle = str;
      ctx.lineWidth = 0.8;
      for (let i = 0; i < 3; i++) {
        ctx.beginPath();
        ctx.moveTo(28, 13 + i * 1.5);
        ctx.lineTo(58, 13 + i * 1.5);
        ctx.stroke();
      }
      break;

    case 'jaguar':
      // Jaguar: offset single-cutaway with unique curves
      ctx.fillStyle = c;
      ctx.beginPath();
      ctx.moveTo(12, 13);
      ctx.lineTo(24, 11);
      ctx.lineTo(27, 17);
      ctx.lineTo(27, 25);
      ctx.lineTo(20, 27);
      ctx.lineTo(10, 27);
      ctx.lineTo(4, 21);
      ctx.lineTo(6, 15);
      ctx.closePath();
      ctx.fill();
      ctx.strokeStyle = dark;
      ctx.lineWidth = 1;
      ctx.stroke();
      // Neck
      ctx.fillStyle = wood;
      ctx.fillRect(28, 12, 19, 4);
      // Fretboard
      ctx.fillStyle = fretboard;
      ctx.fillRect(28, 12.5, 19, 2.5);
      // Headstock
      ctx.fillStyle = wood;
      ctx.fillRect(48, 8, 12, 9);
      // Chrome pickguard area
      ctx.fillStyle = '#e8e0d0';
      ctx.fillRect(8, 16, 10, 10);
      // Tuning pegs
      ctx.fillStyle = metal;
      for (let i = 0; i < 3; i++) {
        ctx.beginPath();
        ctx.arc(51, 11 + i * 2.5, 1, 0, Math.PI * 2);
        ctx.fill();
        ctx.beginPath();
        ctx.arc(59, 11 + i * 2.5, 1, 0, Math.PI * 2);
        ctx.fill();
      }
      // Body pickups (2 jazzmaster style)
      ctx.fillStyle = pickb;
      ctx.fillRect(20, 14, 4, 2.5);
      ctx.fillRect(20, 22, 4, 2.5);
      // Bridge
      ctx.fillStyle = metal;
      ctx.fillRect(16, 26, 10, 1.5);
      // Strings
      ctx.strokeStyle = str;
      ctx.lineWidth = 0.8;
      for (let i = 0; i < 3; i++) {
        ctx.beginPath();
        ctx.moveTo(28, 13 + i * 1.5);
        ctx.lineTo(58, 13 + i * 1.5);
        ctx.stroke();
      }
      break;

    case 'lespaul':
      // Les Paul: thick single cutaway with arched top
      ctx.fillStyle = c;
      ctx.beginPath();
      ctx.moveTo(8, 13);
      ctx.lineTo(24, 11);
      ctx.lineTo(27, 18);
      ctx.lineTo(27, 26);
      ctx.lineTo(20, 28);
      ctx.lineTo(8, 28);
      ctx.lineTo(6, 20);
      ctx.closePath();
      ctx.fill();
      // Arched top (lighter shade)
      ctx.fillStyle = '#d4a574';
      ctx.fillRect(9, 14, 14, 10);
      // Top edge highlight
      ctx.strokeStyle = '#e8c888';
      ctx.lineWidth = 0.5;
      ctx.strokeRect(9, 14, 14, 10);
      // Neck (thick)
      ctx.fillStyle = wood;
      ctx.fillRect(28, 11, 19, 5);
      // Fretboard
      ctx.fillStyle = fretboard;
      ctx.fillRect(28, 11.5, 19, 3.5);
      // Headstock (big 6-in-line)
      ctx.fillStyle = wood;
      ctx.fillRect(48, 8, 12, 9);
      ctx.fillStyle = '#b8944a';
      ctx.fillRect(49, 8.5, 10, 8);
      // Tuning pegs (3x2)
      ctx.fillStyle = metal;
      for (let i = 0; i < 3; i++) {
        ctx.beginPath();
        ctx.arc(51, 11 + i * 2, 1.2, 0, Math.PI * 2);
        ctx.fill();
        ctx.beginPath();
        ctx.arc(59, 11 + i * 2, 1.2, 0, Math.PI * 2);
        ctx.fill();
      }
      // Body humbuckers
      ctx.fillStyle = pickb;
      ctx.fillRect(18, 15, 5, 2.5);
      ctx.fillRect(18, 23, 5, 2.5);
      ctx.fillStyle = metal;
      ctx.fillRect(18.5, 15.5, 4, 1.5);
      ctx.fillRect(18.5, 23.5, 4, 1.5);
      // Bridge
      ctx.fillStyle = metal;
      ctx.fillRect(14, 27, 10, 1.5);
      // Control knobs
      ctx.fillStyle = dark;
      ctx.beginPath();
      ctx.arc(11, 20, 1.5, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.arc(11, 25, 1.5, 0, Math.PI * 2);
      ctx.fill();
      // Strings
      ctx.strokeStyle = str;
      ctx.lineWidth = 0.8;
      for (let i = 0; i < 3; i++) {
        ctx.beginPath();
        ctx.moveTo(28, 13 + i * 1.2);
        ctx.lineTo(58, 13 + i * 1.2);
        ctx.stroke();
      }
      break;

    case 'superstart':
      // Superstrat: aggressive pointed, sharp design
      ctx.fillStyle = c;
      ctx.beginPath();
      ctx.moveTo(10, 11);
      ctx.lineTo(24, 9);
      ctx.lineTo(28, 16);
      ctx.lineTo(28, 25);
      ctx.lineTo(20, 28);
      ctx.lineTo(6, 26);
      ctx.lineTo(4, 15);
      ctx.closePath();
      ctx.fill();
      ctx.strokeStyle = dark;
      ctx.lineWidth = 1;
      ctx.stroke();
      // Neck
      ctx.fillStyle = wood;
      ctx.fillRect(28, 11, 19, 4);
      // Fretboard
      ctx.fillStyle = fretboard;
      ctx.fillRect(28, 11.5, 19, 2.5);
      // Headstock (angular)
      ctx.fillStyle = wood;
      ctx.beginPath();
      ctx.moveTo(48, 8);
      ctx.lineTo(60, 6);
      ctx.lineTo(60, 14);
      ctx.lineTo(48, 16);
      ctx.closePath();
      ctx.fill();
      // Tuning pegs
      ctx.fillStyle = metal;
      for (let i = 0; i < 3; i++) {
        ctx.beginPath();
        ctx.arc(51, 10 + i * 2.5, 1, 0, Math.PI * 2);
        ctx.fill();
        ctx.beginPath();
        ctx.arc(57, 10 + i * 2.5, 1, 0, Math.PI * 2);
        ctx.fill();
      }
      // Body humbuckers (2)
      ctx.fillStyle = pickb;
      ctx.fillRect(22, 13, 4, 2.5);
      ctx.fillRect(22, 21, 4, 2.5);
      ctx.fillStyle = metal;
      ctx.fillRect(22.5, 13.5, 3, 1.5);
      ctx.fillRect(22.5, 21.5, 3, 1.5);
      // Floyd Rose bridge
      ctx.fillStyle = metal;
      ctx.fillRect(16, 26, 12, 2);
      // Strings
      ctx.strokeStyle = str;
      ctx.lineWidth = 0.8;
      for (let i = 0; i < 3; i++) {
        ctx.beginPath();
        ctx.moveTo(28, 12.5 + i * 1.5);
        ctx.lineTo(58, 12.5 + i * 1.5);
        ctx.stroke();
      }
      break;

    case 'explorer':
      // Explorer: geometric angular shape with horns
      ctx.fillStyle = c;
      ctx.beginPath();
      ctx.moveTo(16, 10);
      ctx.lineTo(24, 12);
      ctx.lineTo(26, 18);
      ctx.lineTo(28, 20);
      ctx.lineTo(26, 26);
      ctx.lineTo(14, 28);
      ctx.lineTo(10, 26);
      ctx.lineTo(6, 20);
      ctx.lineTo(8, 16);
      ctx.closePath();
      ctx.fill();
      ctx.strokeStyle = dark;
      ctx.lineWidth = 1;
      ctx.stroke();
      // Neck
      ctx.fillStyle = wood;
      ctx.fillRect(28, 11, 19, 4);
      // Fretboard
      ctx.fillStyle = fretboard;
      ctx.fillRect(28, 12, 19, 2);
      // Headstock (Explorer style - angled)
      ctx.fillStyle = wood;
      ctx.beginPath();
      ctx.moveTo(48, 8);
      ctx.lineTo(60, 5);
      ctx.lineTo(60, 15);
      ctx.lineTo(48, 16);
      ctx.closePath();
      ctx.fill();
      // Tuning pegs
      ctx.fillStyle = metal;
      for (let i = 0; i < 3; i++) {
        ctx.beginPath();
        ctx.arc(51, 9 + i * 2.5, 1, 0, Math.PI * 2);
        ctx.fill();
        ctx.beginPath();
        ctx.arc(57, 9 + i * 2.5, 1, 0, Math.PI * 2);
        ctx.fill();
      }
      // Body humbuckers
      ctx.fillStyle = pickb;
      ctx.fillRect(18, 14, 5, 2.5);
      ctx.fillRect(18, 22, 5, 2.5);
      // Bridge
      ctx.fillStyle = metal;
      ctx.fillRect(16, 26, 10, 1.5);
      // Strings
      ctx.strokeStyle = str;
      ctx.lineWidth = 0.8;
      for (let i = 0; i < 3; i++) {
        ctx.beginPath();
        ctx.moveTo(28, 12.5 + i * 1.5);
        ctx.lineTo(58, 12.5 + i * 1.5);
        ctx.stroke();
      }
      break;

    case 'vshape':
      // Flying V / V-Guitar: sharp V-shaped body
      ctx.fillStyle = c;
      ctx.beginPath();
      ctx.moveTo(26, 10);
      ctx.lineTo(30, 14);
      ctx.lineTo(32, 24);
      ctx.lineTo(26, 26);
      ctx.lineTo(20, 24);
      ctx.lineTo(18, 14);
      ctx.closePath();
      ctx.fill();
      // Lower V wings
      ctx.fillRect(8, 18, 10, 4);
      ctx.fillRect(32, 18, 10, 4);
      ctx.strokeStyle = dark;
      ctx.lineWidth = 1;
      ctx.stroke();
      // Neck
      ctx.fillStyle = wood;
      ctx.fillRect(28, 11, 19, 4);
      // Fretboard
      ctx.fillStyle = fretboard;
      ctx.fillRect(28, 12, 19, 2);
      // Headstock
      ctx.fillStyle = wood;
      ctx.beginPath();
      ctx.moveTo(48, 9);
      ctx.lineTo(60, 6);
      ctx.lineTo(60, 14);
      ctx.lineTo(48, 15);
      ctx.closePath();
      ctx.fill();
      // Tuning pegs
      ctx.fillStyle = metal;
      for (let i = 0; i < 3; i++) {
        ctx.beginPath();
        ctx.arc(51, 9.5 + i * 2, 0.8, 0, Math.PI * 2);
        ctx.fill();
        ctx.beginPath();
        ctx.arc(57, 9.5 + i * 2, 0.8, 0, Math.PI * 2);
        ctx.fill();
      }
      // Body humbucker (center)
      ctx.fillStyle = pickb;
      ctx.fillRect(25, 15, 4, 3);
      ctx.fillStyle = metal;
      ctx.fillRect(25.5, 15.5, 3, 2);
      // Bridge
      ctx.fillStyle = metal;
      ctx.fillRect(24, 25, 6, 1.5);
      // Strings
      ctx.strokeStyle = str;
      ctx.lineWidth = 0.8;
      for (let i = 0; i < 3; i++) {
        ctx.beginPath();
        ctx.moveTo(28, 12 + i * 1.5);
        ctx.lineTo(58, 12 + i * 1.5);
        ctx.stroke();
      }
      break;

    case 'firebird':
      // Firebird fallback shape
      ctx.fillStyle = c;
      ctx.beginPath();
      ctx.moveTo(10, 12);
      ctx.lineTo(24, 9);
      ctx.lineTo(30, 14);
      ctx.lineTo(30, 26);
      ctx.lineTo(24, 28);
      ctx.lineTo(10, 24);
      ctx.closePath();
      ctx.fill();
      ctx.fillStyle = '#d2b48c';
      ctx.fillRect(28, 12, 19, 4);
      ctx.fillStyle = '#2a2020';
      ctx.fillRect(28, 13, 19, 2);
      ctx.fillStyle = metal;
      ctx.fillRect(16, 26, 10, 1.5);
      ctx.strokeStyle = str;
      ctx.lineWidth = 0.8;
      ctx.beginPath();
      ctx.moveTo(28, 13);
      ctx.lineTo(58, 13);
      ctx.stroke();
      break;

    case 'iceman':
      // Iceman fallback shape
      ctx.fillStyle = c;
      ctx.beginPath();
      ctx.moveTo(12, 10);
      ctx.lineTo(26, 9);
      ctx.lineTo(30, 16);
      ctx.lineTo(27, 26);
      ctx.lineTo(20, 28);
      ctx.lineTo(10, 24);
      ctx.closePath();
      ctx.fill();
      ctx.fillStyle = '#d2b48c';
      ctx.fillRect(28, 12, 19, 4);
      ctx.fillStyle = '#2a2020';
      ctx.fillRect(28, 13, 19, 2);
      ctx.fillStyle = metal;
      ctx.fillRect(16, 26, 10, 1.5);
      ctx.strokeStyle = str;
      ctx.lineWidth = 0.8;
      ctx.beginPath();
      ctx.moveTo(28, 13);
      ctx.lineTo(58, 13);
      ctx.stroke();
      break;
  }

  ctx.restore();
}

// Draw guitar on player's back
function drawGuitarOnBack(x, y, facing, guitarIdx) {
  const g = guitarTypes[guitarIdx];
  ctx.save();
  ctx.translate(x + 14, y);
  if (facing < 0) ctx.scale(-1, 1);

  ctx.fillStyle = g.color;
  ctx.shadowColor = 'rgba(0,0,0,0.5)';
  ctx.shadowBlur = 4;
  
  // Simplified back view matched to guitar type
  switch (g.shape) {
    case 'strat':
      // Strat on back
      ctx.beginPath();
      ctx.moveTo(22, 16);
      ctx.lineTo(32, 14);
      ctx.lineTo(34, 22);
      ctx.lineTo(34, 28);
      ctx.lineTo(26, 30);
      ctx.lineTo(20, 26);
      ctx.closePath();
      ctx.fill();
      break;
    case 'mustang':
      // Telecaster on back
      ctx.fillRect(22, 16, 12, 14);
      break;
    case 'jaguar':
      // Jaguar on back
      ctx.beginPath();
      ctx.moveTo(24, 14);
      ctx.lineTo(34, 12);
      ctx.lineTo(36, 20);
      ctx.lineTo(36, 28);
      ctx.lineTo(26, 30);
      ctx.lineTo(20, 26);
      ctx.closePath();
      ctx.fill();
      break;
    case 'lespaul':
      // Les Paul on back (thick)
      ctx.fillRect(20, 14, 16, 16);
      break;
    case 'superstart':
      // Superstrat on back
      ctx.beginPath();
      ctx.moveTo(22, 12);
      ctx.lineTo(34, 10);
      ctx.lineTo(36, 20);
      ctx.lineTo(36, 28);
      ctx.lineTo(24, 30);
      ctx.lineTo(18, 24);
      ctx.closePath();
      ctx.fill();
      break;
    case 'explorer':
      // Explorer on back
      ctx.beginPath();
      ctx.moveTo(26, 12);
      ctx.lineTo(36, 14);
      ctx.lineTo(36, 26);
      ctx.lineTo(26, 30);
      ctx.lineTo(16, 26);
      ctx.lineTo(16, 14);
      ctx.closePath();
      ctx.fill();
      break;
    case 'vshape':
      // V-Guitar on back (compact)
      ctx.beginPath();
      ctx.moveTo(28, 12);
      ctx.lineTo(32, 16);
      ctx.lineTo(34, 26);
      ctx.lineTo(28, 28);
      ctx.lineTo(22, 26);
      ctx.lineTo(24, 16);
      ctx.closePath();
      ctx.fill();
      break;
    case 'firebird':
      ctx.beginPath();
      ctx.moveTo(22, 14);
      ctx.lineTo(32, 12);
      ctx.lineTo(36, 20);
      ctx.lineTo(36, 28);
      ctx.lineTo(24, 30);
      ctx.lineTo(18, 24);
      ctx.closePath();
      ctx.fill();
      break;
    case 'iceman':
      ctx.beginPath();
      ctx.moveTo(20, 12);
      ctx.lineTo(34, 11);
      ctx.lineTo(37, 20);
      ctx.lineTo(33, 28);
      ctx.lineTo(22, 30);
      ctx.lineTo(16, 22);
      ctx.closePath();
      ctx.fill();
      break;
  }
  
  // Neck visible from back
  ctx.fillRect(32, 12, 14, 3);
  // Headstock silhouette
  ctx.fillRect(46, 10, 6, 4);

  ctx.restore();
}

function drawPixelPunk(x, y, facing, frame, showGuitar) {
  ctx.save();
  ctx.translate(x + 14, y);
  if (facing < 0) ctx.scale(-1, 1);
  ctx.translate(-14, 0);

  const walkCycle = frame % 4;
  const isMoving = Math.abs(player.vx) > 0.5 && player.onGround;
  const legOffset = isMoving ? (walkCycle < 2 ? 3 : -1) : 0;
  const armSwing = isMoving ? (walkCycle < 2 ? 2 : -2) : 0;
  const bodyBob = isMoving ? (walkCycle % 2 === 0 ? 0 : 1) : 0;
  const hairOffset = isMoving ? (walkCycle % 2 === 0 ? 0 : 1) : Math.sin(frame * 0.8) * 1;

  // Attack swing with proper guitar shape
  if (player.attacking) {
    ctx.save();
    ctx.translate(35, 22 + bodyBob);
    ctx.rotate(Math.PI);
    drawGuitarShape(0, 0, 1, player.guitarType, true, player.attackTimer);
    ctx.restore();
  }

  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.3)';
  ctx.fillRect(2, 42, 24, 4);

  // Legs
  ctx.fillStyle = selectedPantsColor();
  ctx.fillRect(4, 32 - legOffset, 8, 14 + legOffset);
  ctx.fillRect(16, 32 + legOffset, 8, 14 - legOffset);

  // White outline for pants
  ctx.strokeStyle = '#ffffff';
  ctx.lineWidth = 1;
  ctx.strokeRect(3, 31 - legOffset, 10, 15 + legOffset);
  ctx.strokeRect(15, 31 + legOffset, 10, 15 - legOffset);

  // Boots
  ctx.fillStyle = '#333';
  ctx.fillRect(2, 42, 10, 4);
  ctx.fillRect(16, 42, 10, 4);

  // Body (jacket)
  ctx.fillStyle = '#111';
  ctx.fillRect(4, 14 + bodyBob, 20, 20);

  // Jacket stripes
  ctx.fillStyle = selectedShirtColor();
  ctx.fillRect(4, 18 + bodyBob, 20, 3);
  ctx.fillRect(4, 26 + bodyBob, 20, 3);

  // Shirt pattern / logo
  ctx.fillStyle = '#f0f0f0';
  switch (selectedShirtPattern()) {
    case 'misfits':
      ctx.fillRect(11, 20 + bodyBob, 6, 2);
      ctx.fillRect(10, 22 + bodyBob, 8, 2);
      ctx.fillRect(11, 24 + bodyBob, 2, 3);
      ctx.fillRect(15, 24 + bodyBob, 2, 3);
      ctx.fillRect(13, 25 + bodyBob, 2, 1);
      break;
    case 'mohawk-skull':
      ctx.fillRect(12, 20 + bodyBob, 4, 4);
      ctx.fillRect(11, 24 + bodyBob, 6, 2);
      ctx.fillRect(12, 19 + bodyBob, 1, 2);
      ctx.fillRect(14, 18 + bodyBob, 1, 3);
      ctx.fillStyle = '#111';
      ctx.fillRect(13, 21 + bodyBob, 1, 1);
      ctx.fillRect(15, 21 + bodyBob, 1, 1);
      break;
    case 'jester':
      ctx.fillStyle = '#ffcc00';
      ctx.fillRect(11, 20 + bodyBob, 2, 5);
      ctx.fillRect(15, 20 + bodyBob, 2, 5);
      ctx.fillStyle = '#ff4fd8';
      ctx.fillRect(13, 23 + bodyBob, 2, 4);
      break;
    case 'huy':
      ctx.fillStyle = '#f0f0f0';
      ctx.font = 'bold 4px Consolas, "Courier New", monospace';
      ctx.fillText('X*Y', 10, 25 + bodyBob);
      break;
    case 'punks-not-dead':
      ctx.fillStyle = '#f0f0f0';
      ctx.fillRect(10, 20 + bodyBob, 8, 1);
      ctx.fillRect(10, 22 + bodyBob, 8, 1);
      ctx.fillRect(10, 24 + bodyBob, 8, 1);
      break;
  }

  // Arms
  ctx.fillStyle = '#111';
  ctx.fillRect(0, 16 + armSwing, 5, 14);
  ctx.fillRect(23, 16 - armSwing, 5, 14);

  // Hands
  ctx.fillStyle = selectedSkinTone();
  ctx.fillRect(0, 28 + armSwing, 5, 5);
  ctx.fillRect(23, 28 - armSwing, 5, 5);

  // Head
  ctx.fillStyle = selectedSkinTone();
  ctx.fillRect(6, 2 + bodyBob, 16, 14);

  // Hair (mohawk)
  ctx.fillStyle = selectedHairColor();
  ctx.fillRect(8, -6 + hairOffset + bodyBob, 12, 10);
  // Spikes
  for (let i = 0; i < 5; i++) {
    ctx.fillRect(7 + i * 3, -10 + hairOffset + bodyBob, 2, 5);
  }

  // Eyes
  ctx.fillStyle = '#000';
  ctx.fillRect(8, 6 + bodyBob, 4, 4);
  ctx.fillRect(16, 6 + bodyBob, 4, 4);
  // Eye shine
  ctx.fillStyle = '#39ff14';
  ctx.fillRect(9, 6 + bodyBob, 2, 2);
  ctx.fillRect(17, 6 + bodyBob, 2, 2);

  // Mouth
  ctx.fillStyle = '#000';
  ctx.fillRect(10, 12 + bodyBob, 8, 2);

  // Guitar in hands once equipped
  if (showGuitar && !player.attacking) {
    ctx.save();
    ctx.translate(15, 27 + bodyBob);
    ctx.rotate(Math.PI);
    ctx.scale(0.8, 0.8);
    drawGuitarShape(0, 0, 1, player.guitarType, false, 0);
    ctx.restore();
  }

  ctx.restore();
}

function drawPlatform(p) {
  const sx = p.x - camX;
  if (sx + p.w < 0 || sx > GAME_W) return;

  if (p.type === 'ground') {
    ctx.fillStyle = '#2a2a2a';
    ctx.fillRect(sx, p.y, p.w, p.h);
    ctx.fillStyle = '#3a3a3a';
    ctx.fillRect(sx, p.y, p.w, 8);
    ctx.fillStyle = '#1a1a1a';
    ctx.fillRect(sx, p.y + p.h - 4, p.w, 4);
  } else {
    ctx.fillStyle = '#4a3a2a';
    ctx.fillRect(sx, p.y, p.w, p.h);
    ctx.fillStyle = '#6a5a4a';
    ctx.fillRect(sx + 2, p.y + 2, p.w - 4, p.h - 4);
    ctx.fillStyle = '#3a2a1a';
    ctx.fillRect(sx, p.y, p.w, 4);
  }
}

function drawCoin(c) {
  if (c.collected) return;
  const sx = c.x - camX;
  if (sx < -20 || sx > 820) return;

  if (c.golden) {
    // Golden can with pulsing glow - restores one heart.
    const pulse = 0.5 + 0.5 * Math.sin(Date.now() * 0.006);
    ctx.save();
    ctx.shadowColor = '#ffd35a';
    ctx.shadowBlur = 8 + pulse * 6;

    ctx.fillStyle = '#ffd35a';
    ctx.fillRect(sx - 5, c.y - 16, 10, 14);

    ctx.fillStyle = '#c78a12';
    ctx.fillRect(sx - 5, c.y - 16, 10, 2);
    ctx.fillRect(sx - 5, c.y - 4, 10, 2);
    ctx.fillRect(sx - 4, c.y - 11, 8, 4);

    ctx.fillStyle = '#fff0a8';
    ctx.fillRect(sx - 5, c.y - 18, 10, 2);

    ctx.fillStyle = '#c78a12';
    ctx.beginPath();
    ctx.ellipse(sx, c.y - 16, 5, 1.2, 0, 0, Math.PI * 2);
    ctx.fill();

    ctx.fillStyle = 'rgba(255, 255, 255, 0.7)';
    ctx.fillRect(sx - 3.5, c.y - 13, 2, 8);

    // Heart icon in center
    ctx.fillStyle = '#ff3b5c';
    ctx.fillRect(sx - 3, c.y - 10, 2, 2);
    ctx.fillRect(sx + 1, c.y - 10, 2, 2);
    ctx.fillRect(sx - 3, c.y - 9, 6, 2);
    ctx.fillRect(sx - 2, c.y - 7, 4, 2);
    ctx.fillRect(sx - 1, c.y - 5, 2, 1);

    ctx.restore();
    return;
  }

  // Beer can - white body with red bands and center label
  ctx.fillStyle = '#ffffff';
  ctx.fillRect(sx - 5, c.y - 16, 10, 14);

  ctx.fillStyle = '#d92b2b';
  ctx.fillRect(sx - 5, c.y - 16, 10, 2);
  ctx.fillRect(sx - 5, c.y - 4, 10, 2);
  ctx.fillRect(sx - 4, c.y - 11, 8, 4);

  ctx.fillStyle = '#d0d0d0';
  ctx.fillRect(sx - 5, c.y - 18, 10, 2);

  ctx.fillStyle = '#b0b0b0';
  ctx.beginPath();
  ctx.ellipse(sx, c.y - 16, 5, 1.2, 0, 0, Math.PI * 2);
  ctx.fill();

  ctx.fillStyle = 'rgba(255, 255, 255, 0.4)';
  ctx.fillRect(sx - 3.5, c.y - 13, 2, 8);

  ctx.fillStyle = '#ffff99';
  ctx.beginPath();
  ctx.arc(sx + 4, c.y - 10, 1, 0, Math.PI * 2);
  ctx.fill();
}

function drawEnemy(e) {
  if (!e.alive) return;
  if (e.type === 'dasher' && !e.active) return;
  const sx = e.x - camX;
  if (sx < -80 || sx > 880) return;

  if (e.type === 'flyer') {
    drawBat(sx, e.y);
    return;
  }
  if (e.type === 'brute') {
    drawBrute(sx, e.y, e);
    return;
  }
  if (e.type === 'rat') {
    drawRat(sx, e.y, e);
    return;
  }
  if (e.type === 'dasher') {
    drawDasher(sx, e.y, e);
    return;
  }

  ctx.fillStyle = '#ff3333';
  ctx.fillRect(sx - 12, e.y - 28, 24, 24);
  ctx.fillStyle = '#aa0000';
  ctx.fillRect(sx - 14, e.y - 30, 28, 28);

  // Eyes
  ctx.fillStyle = '#fff';
  ctx.fillRect(sx - 8, e.y - 22, 6, 6);
  ctx.fillRect(sx + 2, e.y - 22, 6, 6);
  ctx.fillStyle = '#000';
  ctx.fillRect(sx - 6, e.y - 20, 3, 3);
  ctx.fillRect(sx + 4, e.y - 20, 3, 3);

  // Antenna
  ctx.fillStyle = '#ff3333';
  ctx.fillRect(sx - 1, e.y - 38, 2, 10);
  ctx.fillStyle = '#ffff00';
  ctx.fillRect(sx - 3, e.y - 40, 6, 6);
}

function drawBrute(sx, y, e) {
  const flash = e.hitFlash > 0;
  ctx.save();
  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.35)';
  ctx.beginPath();
  ctx.ellipse(sx, y + 2, 22, 4, 0, 0, Math.PI * 2);
  ctx.fill();
  // Main rusted body - outer shell
  ctx.fillStyle = flash ? '#ffe8a0' : '#4a2a18';
  ctx.fillRect(sx - 20, y - 40, 40, 40);
  // Inner body
  ctx.fillStyle = flash ? '#ffd060' : '#6b3a22';
  ctx.fillRect(sx - 18, y - 38, 36, 36);
  // Rust patches
  ctx.fillStyle = flash ? '#ffaa44' : '#8a4520';
  ctx.fillRect(sx - 14, y - 30, 6, 6);
  ctx.fillRect(sx + 6,  y - 22, 8, 8);
  ctx.fillRect(sx - 10, y - 12, 10, 4);
  // Bolts
  ctx.fillStyle = '#2a1810';
  ctx.fillRect(sx - 18, y - 38, 3, 3);
  ctx.fillRect(sx + 15, y - 38, 3, 3);
  ctx.fillRect(sx - 18, y - 5,  3, 3);
  ctx.fillRect(sx + 15, y - 5,  3, 3);
  // Top spikes (stomp deterrent)
  ctx.fillStyle = '#2a1a12';
  for (let i = -2; i <= 2; i++) {
    const sxi = sx + i * 7;
    ctx.beginPath();
    ctx.moveTo(sxi - 3, y - 40);
    ctx.lineTo(sxi,     y - 48);
    ctx.lineTo(sxi + 3, y - 40);
    ctx.closePath();
    ctx.fill();
  }
  // Glowing eyes
  ctx.fillStyle = flash ? '#ffffff' : '#7cff50';
  ctx.fillRect(sx - 10, y - 30, 5, 5);
  ctx.fillRect(sx + 5,  y - 30, 5, 5);
  // Eye glow
  ctx.fillStyle = 'rgba(124, 255, 80, 0.35)';
  ctx.fillRect(sx - 12, y - 32, 9, 9);
  ctx.fillRect(sx + 3,  y - 32, 9, 9);
  // Mouth grill
  ctx.fillStyle = '#1a0e08';
  ctx.fillRect(sx - 10, y - 16, 20, 6);
  ctx.fillStyle = '#4a2e1a';
  for (let gx = sx - 9; gx < sx + 10; gx += 3) ctx.fillRect(gx, y - 16, 1, 6);
  // HP bar above head
  const hpRatio = Math.max(0, e.hp / e.maxHp);
  ctx.fillStyle = '#220808';
  ctx.fillRect(sx - 18, y - 56, 36, 4);
  ctx.fillStyle = hpRatio > 0.5 ? '#7cff50' : (hpRatio > 0.25 ? '#ffcc00' : '#ff3333');
  ctx.fillRect(sx - 18, y - 56, 36 * hpRatio, 4);
  ctx.strokeStyle = '#000';
  ctx.lineWidth = 1;
  ctx.strokeRect(sx - 18.5, y - 56.5, 37, 5);
  ctx.restore();
}

function drawBat(sx, y) {
  const flap = Math.sin(Date.now() * 0.018) * 4;
  ctx.save();
  // Wings
  ctx.fillStyle = '#2a0a35';
  ctx.beginPath();
  ctx.moveTo(sx - 6, y - 18);
  ctx.lineTo(sx - 22, y - 22 + flap);
  ctx.lineTo(sx - 18, y - 12 + flap);
  ctx.lineTo(sx - 6, y - 10);
  ctx.closePath();
  ctx.fill();
  ctx.beginPath();
  ctx.moveTo(sx + 6, y - 18);
  ctx.lineTo(sx + 22, y - 22 + flap);
  ctx.lineTo(sx + 18, y - 12 + flap);
  ctx.lineTo(sx + 6, y - 10);
  ctx.closePath();
  ctx.fill();
  // Body
  ctx.fillStyle = '#4a1a55';
  ctx.fillRect(sx - 7, y - 22, 14, 14);
  // Head
  ctx.fillStyle = '#3a1045';
  ctx.fillRect(sx - 5, y - 28, 10, 8);
  // Ears
  ctx.beginPath();
  ctx.moveTo(sx - 5, y - 28);
  ctx.lineTo(sx - 7, y - 33);
  ctx.lineTo(sx - 2, y - 28);
  ctx.closePath();
  ctx.fill();
  ctx.beginPath();
  ctx.moveTo(sx + 5, y - 28);
  ctx.lineTo(sx + 7, y - 33);
  ctx.lineTo(sx + 2, y - 28);
  ctx.closePath();
  ctx.fill();
  // Glowing eyes
  ctx.fillStyle = '#ff3b3b';
  ctx.fillRect(sx - 3, y - 25, 2, 2);
  ctx.fillRect(sx + 1, y - 25, 2, 2);
  // Fang
  ctx.fillStyle = '#fff';
  ctx.fillRect(sx - 1, y - 22, 1, 2);
  ctx.fillRect(sx + 1, y - 22, 1, 2);
  ctx.restore();
}

function drawRat(sx, y, e) {
  ctx.save();
  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.35)';
  ctx.beginPath();
  ctx.ellipse(sx, y, 14, 2.5, 0, 0, Math.PI * 2);
  ctx.fill();
  // Direction based on velocity
  const dir = e.vx < 0 ? -1 : 1;
  // Body
  ctx.fillStyle = '#4a3a30';
  ctx.fillRect(sx - 12, y - 14, 24, 12);
  // Belly
  ctx.fillStyle = '#6a5a48';
  ctx.fillRect(sx - 10, y - 10, 20, 6);
  // Head
  ctx.fillStyle = '#3a2a22';
  ctx.fillRect(sx + dir * 8, y - 16, 8, 8);
  // Ears
  ctx.fillStyle = '#2a1a14';
  ctx.fillRect(sx + dir * 8, y - 18, 3, 3);
  ctx.fillRect(sx + dir * 13, y - 18, 3, 3);
  // Inner ear
  ctx.fillStyle = '#8a5a6a';
  ctx.fillRect(sx + dir * 9, y - 17, 1, 1);
  ctx.fillRect(sx + dir * 14, y - 17, 1, 1);
  // Eye (red, glowing)
  ctx.fillStyle = '#ff3030';
  ctx.fillRect(sx + dir * 12, y - 13, 2, 2);
  ctx.fillStyle = 'rgba(255,60,60,0.4)';
  ctx.fillRect(sx + dir * 11, y - 14, 4, 4);
  // Snout + teeth
  ctx.fillStyle = '#c8b0a0';
  ctx.fillRect(sx + dir * 16, y - 10, 2, 3);
  ctx.fillStyle = '#fff';
  ctx.fillRect(sx + dir * 16, y - 8, 1, 2);
  // Legs
  ctx.fillStyle = '#2a1a12';
  ctx.fillRect(sx - 10, y - 4, 3, 4);
  ctx.fillRect(sx + 7,  y - 4, 3, 4);
  // Tail (wavy)
  ctx.strokeStyle = '#8a6a50';
  ctx.lineWidth = 2;
  ctx.beginPath();
  const tailStart = sx - dir * 12;
  ctx.moveTo(tailStart, y - 10);
  ctx.quadraticCurveTo(tailStart - dir * 10, y - 18, tailStart - dir * 18, y - 8);
  ctx.stroke();
  ctx.restore();
}

function drawDasher(sx, y, e) {
  // Giant sewer rat sprinting across the screen. Armored: immune to guitar hits.
  const dir = e.vx >= 0 ? 1 : -1;
  ctx.save();

  // Motion-blur streaks behind the rat
  for (let i = 1; i <= 5; i++) {
    ctx.globalAlpha = 0.22 - i * 0.035;
    ctx.fillStyle = '#3a2a22';
    ctx.fillRect(sx - dir * (30 + i * 10), y - 24, 26, 18);
  }
  ctx.globalAlpha = 1;

  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.5)';
  ctx.beginPath();
  ctx.ellipse(sx, y + 2, 34, 4, 0, 0, Math.PI * 2);
  ctx.fill();

  // Running leg animation (two-frame gallop)
  const legCycle = Math.floor(Date.now() * 0.03) % 2;
  const legFrontA = legCycle === 0 ? 6 : 2;
  const legFrontB = legCycle === 0 ? 2 : 6;

  // Back legs
  ctx.fillStyle = '#1e140e';
  ctx.fillRect(sx - dir * 22, y - 4, 4, legFrontA);
  ctx.fillRect(sx - dir * 16, y - 4, 4, legFrontB);
  // Front legs
  ctx.fillRect(sx + dir * 16, y - 4, 4, legFrontB);
  ctx.fillRect(sx + dir * 22, y - 4, 4, legFrontA);

  // Body - main dark fur
  ctx.fillStyle = '#3a2a20';
  ctx.fillRect(sx - 28, y - 22, 56, 20);
  // Belly highlight
  ctx.fillStyle = '#5a4a3a';
  ctx.fillRect(sx - 24, y - 12, 48, 8);
  // Fur shading along top
  ctx.fillStyle = '#1e140e';
  ctx.fillRect(sx - 26, y - 22, 52, 4);
  // Hunched back hump
  ctx.fillStyle = '#2a1e14';
  ctx.fillRect(sx - 8, y - 26, 18, 6);

  // Fur tufts
  ctx.fillStyle = '#4a382a';
  for (let i = 0; i < 6; i++) {
    ctx.fillRect(sx - 22 + i * 9, y - 18 - (i % 2) * 2, 2, 2);
  }

  // Head (at the front, extended forward)
  const hx = sx + dir * 28;
  ctx.fillStyle = '#2e2018';
  ctx.fillRect(hx, y - 22, dir * 18, 16);
  // Normalize head rect for further drawing
  const headX = dir > 0 ? hx : hx + dir * 18;
  const headW = 18;
  // Snout
  ctx.fillStyle = '#1a1208';
  ctx.fillRect(headX + (dir > 0 ? headW : -6), y - 14, 6, 6);
  // Nose
  ctx.fillStyle = '#ff6080';
  ctx.fillRect(headX + (dir > 0 ? headW + 4 : -6), y - 12, 2, 2);
  // Ears (big pointy)
  ctx.fillStyle = '#2a1a12';
  ctx.beginPath();
  ctx.moveTo(headX + 4, y - 22);
  ctx.lineTo(headX + 8, y - 32);
  ctx.lineTo(headX + 12, y - 22);
  ctx.closePath();
  ctx.fill();
  ctx.beginPath();
  ctx.moveTo(headX + headW - 12, y - 22);
  ctx.lineTo(headX + headW - 8, y - 32);
  ctx.lineTo(headX + headW - 4, y - 22);
  ctx.closePath();
  ctx.fill();
  // Inner ear
  ctx.fillStyle = '#8a3a50';
  ctx.fillRect(headX + 7,         y - 26, 2, 2);
  ctx.fillRect(headX + headW - 9, y - 26, 2, 2);

  // Glowing red eye
  ctx.fillStyle = 'rgba(255, 40, 40, 0.35)';
  ctx.fillRect(headX + (dir > 0 ? headW - 7 : 2), y - 19, 6, 5);
  ctx.fillStyle = '#ff2020';
  ctx.fillRect(headX + (dir > 0 ? headW - 6 : 3), y - 18, 4, 3);
  ctx.fillStyle = '#ffff80';
  ctx.fillRect(headX + (dir > 0 ? headW - 5 : 4), y - 18, 1, 1);

  // Fangs (white)
  ctx.fillStyle = '#fff';
  ctx.fillRect(headX + (dir > 0 ? headW + 1 : -2), y - 9, 1, 3);
  ctx.fillRect(headX + (dir > 0 ? headW + 3 : -4), y - 9, 1, 3);

  // Long whippy tail (behind)
  const tailWave = Math.sin(Date.now() * 0.02) * 6;
  ctx.strokeStyle = '#8a6a50';
  ctx.lineWidth = 3;
  ctx.beginPath();
  const tx0 = sx - dir * 28;
  ctx.moveTo(tx0, y - 14);
  ctx.quadraticCurveTo(tx0 - dir * 16, y - 22 + tailWave, tx0 - dir * 34, y - 10 - tailWave);
  ctx.stroke();
  // Tail segments
  ctx.strokeStyle = '#6a4e38';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(tx0 - dir * 6,  y - 18 + tailWave * 0.4);
  ctx.lineTo(tx0 - dir * 20, y - 20 + tailWave * 0.8);
  ctx.stroke();

  ctx.restore();
}

function drawPoisonHazards() {
  if (poisonSources.length === 0 && poisonDrops.length === 0) return;
  const now = Date.now() * 0.004;

  // Ceiling drippers - rusty pipe nozzle with a bulging acid droplet on the tip.
  for (const src of poisonSources) {
    const sx = src.x - camX;
    if (sx < -30 || sx > GAME_W + 30) continue;
    // Stalactite/nozzle
    ctx.fillStyle = '#2a2418';
    ctx.fillRect(sx - 5, src.y - 12, 10, 10);
    ctx.fillStyle = '#3a3020';
    ctx.fillRect(sx - 4, src.y - 11, 8, 4);
    // Rust ring
    ctx.fillStyle = '#6a3a20';
    ctx.fillRect(sx - 5, src.y - 3, 10, 2);
    // Swelling droplet at the tip (pulses with timer approach)
    const wobble = 1 + Math.sin(now + src.wobble) * 0.5;
    const rad = 2.2 + Math.max(0, 1.8 - src.timer / 40) + wobble * 0.3;
    ctx.fillStyle = '#5cff80';
    ctx.beginPath();
    ctx.arc(sx, src.y + 2, rad, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = 'rgba(140, 255, 120, 0.4)';
    ctx.beginPath();
    ctx.arc(sx, src.y + 2, rad + 1.4, 0, Math.PI * 2);
    ctx.fill();
    // Highlight
    ctx.fillStyle = '#d6ffd0';
    ctx.fillRect(sx - 1, src.y + 1, 1, 1);
  }

  // Falling acid droplets - tear-drop shape with trailing glow.
  for (const d of poisonDrops) {
    const sx = d.x - camX;
    if (sx < -20 || sx > GAME_W + 20) continue;
    // Glow trail
    ctx.fillStyle = 'rgba(92, 255, 128, 0.28)';
    ctx.beginPath();
    ctx.ellipse(sx, d.y - 8, 3, 8, 0, 0, Math.PI * 2);
    ctx.fill();
    // Teardrop body
    ctx.fillStyle = '#5cff80';
    ctx.beginPath();
    ctx.moveTo(sx, d.y - 7);
    ctx.quadraticCurveTo(sx - 4, d.y - 2, sx - 3, d.y + 2);
    ctx.quadraticCurveTo(sx, d.y + 6, sx + 3, d.y + 2);
    ctx.quadraticCurveTo(sx + 4, d.y - 2, sx, d.y - 7);
    ctx.closePath();
    ctx.fill();
    // Inner highlight
    ctx.fillStyle = '#d6ffd0';
    ctx.fillRect(sx - 1, d.y - 3, 1, 2);
  }
}

function drawFlag() {
  const sx = player.goalX - camX;
  ctx.fillStyle = '#666';
  ctx.fillRect(sx, 360, 6, 88);
  ctx.fillStyle = '#39ff14';
  ctx.fillRect(sx + 6, 360, 30, 20);
  ctx.fillStyle = '#ff00ff';
  ctx.fillRect(sx + 12, 364, 20, 12);
}

function drawBackground() {
  if (currentLevel === 4) {
    drawSewerBackground();
    return;
  }
  if (currentLevel === 3) {
    drawJunkyardBackground();
    return;
  }
  if (currentLevel === 2) {
    drawVillageBackground();
    return;
  }
  // Dark night sky gradient
  const grad = ctx.createLinearGradient(0, 0, 0, GAME_H);
  grad.addColorStop(0, '#0a0812');
  grad.addColorStop(0.4, '#12101a');
  grad.addColorStop(1, '#1a1520');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, GAME_W, GAME_H);

  // Subtle stars
  ctx.fillStyle = 'rgba(255,255,255,0.4)';
  for (let i = 0; i < 40; i++) {
    const sx = (i * 173 + camX * 0.05) % GAME_W;
    const sy = (i * 89) % 280;
    ctx.fillRect(sx, sy, 1, 1);
  }

  // Buildings
  const buildingColors = ['#12101a', '#15181f', '#0f1218', '#181622'];
  const warmLights = ['#ff9944', '#ffbb66', '#eeaa55', '#dd8833'];

  for (let i = 0; i < 20; i++) {
    const bx = (i * 120 - camX * 0.3) % 900 - 50;
    const bh = 80 + (i * 37) % 120;
    ctx.fillStyle = buildingColors[i % buildingColors.length];
    ctx.fillRect(bx, GAME_H - bh, 80, bh);
    ctx.fillStyle = '#1a1a25';
    ctx.fillRect(bx + 4, GAME_H - bh + 4, 72, bh - 4);

    ctx.fillStyle = warmLights[i % warmLights.length];
    ctx.globalAlpha = 0.3;
    for (let wy = GAME_H - bh + 12; wy < GAME_H - 15; wy += 22) {
      for (let wx = bx + 8; wx < bx + 72; wx += 18) {
        if ((i + wy) % 3 !== 0) ctx.fillRect(wx, wy, 6, 10);
      }
    }
    ctx.globalAlpha = 1;

    // A couple of brighter windows make the skyline feel more alive.
    const brightWindow1X = bx + 8 + ((i * 7) % 4) * 18;
    const brightWindow1Y = GAME_H - bh + 12 + ((i * 5) % 3) * 22;
    const brightWindow2X = bx + 8 + ((i * 11 + 2) % 4) * 18;
    const brightWindow2Y = GAME_H - bh + 12 + ((i * 3 + 1) % 3) * 22;

    ctx.fillStyle = '#ffd98a';
    ctx.globalAlpha = 0.7;
    ctx.fillRect(brightWindow1X, brightWindow1Y, 6, 10);
    if (i % 2 === 0) ctx.fillRect(brightWindow2X, brightWindow2Y, 6, 10);

    ctx.fillStyle = '#fff1b8';
    ctx.globalAlpha = 0.28;
    ctx.fillRect(brightWindow1X - 1, brightWindow1Y - 1, 8, 12);
    if (i % 2 === 0) ctx.fillRect(brightWindow2X - 1, brightWindow2Y - 1, 8, 12);
    ctx.globalAlpha = 1;
  }
}

function drawJunkyardBackground() {
  // Smoggy polluted sky
  const grad = ctx.createLinearGradient(0, 0, 0, GAME_H);
  grad.addColorStop(0, '#302a1e');
  grad.addColorStop(0.4, '#3e3020');
  grad.addColorStop(1, '#1a140e');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, GAME_W, GAME_H);

  // Hazy sun through smog
  ctx.fillStyle = 'rgba(220, 170, 80, 0.35)';
  ctx.beginPath();
  ctx.arc(580, 110, 50, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = 'rgba(220, 170, 80, 0.15)';
  ctx.beginPath();
  ctx.arc(580, 110, 80, 0, Math.PI * 2);
  ctx.fill();

  // Drifting smog clouds
  ctx.fillStyle = 'rgba(70, 60, 50, 0.4)';
  for (let i = 0; i < 10; i++) {
    const cx = (i * 180 - camX * 0.1) % 1000 - 120;
    const cy = 40 + (i * 31) % 60;
    ctx.beginPath();
    ctx.ellipse(cx, cy, 70, 12, 0, 0, Math.PI * 2);
    ctx.fill();
  }

  // Far crane silhouettes
  ctx.fillStyle = '#1a1612';
  for (let i = 0; i < 4; i++) {
    const cx = (i * 320 - camX * 0.2) % 1100 - 200;
    // Mast
    ctx.fillRect(cx, GAME_H - 260, 4, 180);
    // Arm
    ctx.fillRect(cx - 60, GAME_H - 260, 120, 4);
    // Hook chain
    ctx.fillRect(cx + 40, GAME_H - 256, 1, 30);
    ctx.fillRect(cx + 36, GAME_H - 226, 8, 8);
    // Counterweight
    ctx.fillRect(cx - 18, GAME_H - 256, 12, 12);
  }

  // Mid trash hills
  const hillColors = ['#2a2218', '#342820', '#1f1812'];
  for (let i = 0; i < 16; i++) {
    const hx = (i * 190 - camX * 0.35) % 1000 - 120;
    const hh = 70 + (i * 23) % 40;
    ctx.fillStyle = hillColors[i % hillColors.length];
    ctx.beginPath();
    ctx.moveTo(hx, GAME_H - 46);
    ctx.lineTo(hx + 60, GAME_H - 46 - hh);
    ctx.lineTo(hx + 180, GAME_H - 46);
    ctx.closePath();
    ctx.fill();
    // Junk bits sticking out
    ctx.fillStyle = '#555042';
    ctx.fillRect(hx + 40, GAME_H - 56 - hh * 0.6, 6, 10);
    ctx.fillStyle = '#6a4a2a';
    ctx.fillRect(hx + 90, GAME_H - 64 - hh * 0.4, 8, 14);
    ctx.fillStyle = '#3a6a3a';
    ctx.fillRect(hx + 130, GAME_H - 58 - hh * 0.7, 5, 12);
  }

  // Rusted shipping containers scattered behind gameplay
  const containerColors = ['#6a2a1a', '#5a3a1a', '#3a4a2a', '#6a6a2a'];
  for (let i = 0; i < 10; i++) {
    const bx = (i * 260 - camX * 0.55) % 1100 - 150;
    const bw = 110 + (i * 11) % 40;
    const bh = 60 + (i * 17) % 20;
    const by = GAME_H - bh - 46;
    ctx.fillStyle = containerColors[i % containerColors.length];
    ctx.fillRect(bx, by, bw, bh);
    // Ribbed panels
    ctx.fillStyle = 'rgba(0,0,0,0.25)';
    for (let r = bx + 6; r < bx + bw - 4; r += 10) {
      ctx.fillRect(r, by + 2, 2, bh - 4);
    }
    // Rust streaks
    ctx.fillStyle = 'rgba(180, 90, 40, 0.35)';
    ctx.fillRect(bx + 12, by + 10, 3, bh - 14);
    ctx.fillRect(bx + bw - 22, by + 6, 2, bh - 10);
    // Graffiti tag
    ctx.fillStyle = '#39ff14';
    ctx.font = 'bold 10px Consolas, "Courier New", monospace';
    ctx.fillText('PUNK', bx + 18, by + bh / 2 + 4);
  }

  // Burning barrels with smoke
  for (let i = 0; i < 6; i++) {
    const bx = (i * 340 - camX * 0.75) % 900 - 80;
    const by = GAME_H - 66;
    // Barrel body
    ctx.fillStyle = '#4a2818';
    ctx.fillRect(bx, by, 20, 28);
    ctx.fillStyle = '#2a1408';
    ctx.fillRect(bx, by, 20, 3);
    ctx.fillRect(bx, by + 25, 20, 3);
    // Flames
    const flicker = Math.sin(Date.now() * 0.02 + i) * 2;
    ctx.fillStyle = '#ff9a22';
    ctx.beginPath();
    ctx.moveTo(bx + 2,  by);
    ctx.lineTo(bx + 10, by - 14 - flicker);
    ctx.lineTo(bx + 18, by);
    ctx.closePath();
    ctx.fill();
    ctx.fillStyle = '#ffd060';
    ctx.beginPath();
    ctx.moveTo(bx + 5,  by);
    ctx.lineTo(bx + 10, by - 8 - flicker);
    ctx.lineTo(bx + 15, by);
    ctx.closePath();
    ctx.fill();
    // Smoke
    ctx.fillStyle = 'rgba(80,70,60,0.35)';
    for (let s = 0; s < 3; s++) {
      ctx.beginPath();
      ctx.arc(bx + 10, by - 24 - s * 12 - flicker, 5 + s * 2, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  // Foreground tire piles
  ctx.fillStyle = '#0e0a08';
  for (let i = 0; i < 8; i++) {
    const tx = (i * 230 - camX * 0.95) % 900 - 80;
    const ty = GAME_H - 52;
    for (let layer = 0; layer < 3; layer++) {
      for (let t = 0; t < 3 - layer; t++) {
        const cx = tx + t * 14 + layer * 7;
        const cy = ty - layer * 10;
        ctx.beginPath();
        ctx.arc(cx, cy, 6, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#1a1412';
        ctx.beginPath();
        ctx.arc(cx, cy, 3, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#0e0a08';
      }
    }
  }
}

  // Village cottages (mid parallax, behind gameplay)

  const wallColors = ['#5a3628', '#4a2c20', '#6a4028'];
  for (let i = 0; i < 18; i++) {

    ctx.moveTo(bx - 5, by);
    ctx.lineTo(bx + bw / 2, by - 26);
    ctx.lineTo(bx + bw + 5, by);
    ctx.closePath();
    ctx.fill();
    // Chimney
    ctx.fillStyle = '#2a1a18';
    ctx.fillRect(bx + bw - 18, by - 20, 8, 14);
    // Smoke puffs
    ctx.fillStyle = 'rgba(200,200,220,0.18)';
    const smokePhase = (Date.now() * 0.001 + i) % 3;
    for (let s = 0; s < 3; s++) {

      ctx.beginPath();
      ctx.arc(bx + bw - 14, by - 28 - sOff * 10, 4 + sOff * 2, 0, Math.PI * 2);
      ctx.fill();

    // Warm windows

    if (bw > 80) ctx.fillRect(bx + bw - 26, by + 14, 18, 18);
